<!doctype html>

<html class="light" lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Orbit - Zaloguj się</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#2463eb',
              'background-light': '#f8fafc',
              'background-dark': '#111621',
              'border-light': '#e2e8f0',
              'text-main': '#0f172a',
              'text-muted': '#64748b',
            },
            fontFamily: {
              display: ['Inter', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              md: '6px',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .bg-soft-gradient {
        background: radial-gradient(circle at top right, #f1f5f9, #e2e8f0);
      }
      .dark .bg-soft-gradient {
        background: radial-gradient(circle at top right, #1e293b, #111621);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-6 bg-soft-gradient"
  >
    <!-- Main Login Card -->
    <div
      class="w-full max-w-[440px] bg-white dark:bg-slate-900 rounded-xl shadow-2xl shadow-primary/5 border border-border-light dark:border-slate-800 overflow-hidden"
    >
      <!-- Top Logo Header -->
      <div class="pt-10 pb-6 flex flex-col items-center">
        <div class="flex items-center gap-2 mb-2">
          <div
            class="bg-primary p-2 rounded-lg flex items-center justify-center text-white"
          >
            <span
              class="material-symbols-outlined !text-2xl"
              style="font-variation-settings: 'FILL' 1"
              >orbit</span
            >
          </div>
          <h2
            class="text-text-main dark:text-slate-100 text-2xl font-bold tracking-tight"
          >
            Orbit
          </h2>
        </div>
        <p class="text-text-muted dark:text-slate-400 text-sm">
          Zarządzaj swoimi projektami z łatwością
        </p>
      </div>
      <!-- Banner Decoration -->
      <div class="px-8 mb-6">
        <div
          class="h-32 w-full rounded-lg bg-primary/5 flex items-center justify-center relative overflow-hidden"
        >
          <div
            class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary via-transparent to-transparent"
          ></div>
          <div class="z-10 text-primary/40">
            <span class="material-symbols-outlined !text-6xl">view_kanban</span>
          </div>
        </div>
      </div>
      <div class="px-10 pb-10">
        <!-- Heading -->
        <h1
          class="text-text-main dark:text-slate-100 text-[28px] font-bold leading-tight text-center mb-8"
        >
          Zaloguj się
        </h1>
        <!-- Form -->
        <form action="#" class="space-y-5" onsubmit="return false;">
          <!-- Email Field -->
          <div class="space-y-2">
            <label
              class="block text-text-main dark:text-slate-200 text-sm font-semibold"
            >
              E-mail
            </label>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-lg"
                >mail</span
              >
              <input
                class="w-full h-10 pl-10 pr-4 rounded-md border border-border-light dark:border-slate-700 bg-white dark:bg-slate-800 text-text-main dark:text-slate-100 placeholder:text-text-muted focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm"
                placeholder="wpisz swój e-mail"
                required=""
                type="email"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-2">
            <div class="flex justify-between items-center">
              <label
                class="block text-text-main dark:text-slate-200 text-sm font-semibold"
              >
                Hasło
              </label>
              <a
                class="text-primary text-xs font-medium hover:underline"
                href="#"
                >Zapomniałeś hasła?</a
              >
            </div>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-lg"
                >lock</span
              >
              <input
                class="w-full h-10 pl-10 pr-4 rounded-md border border-border-light dark:border-slate-700 bg-white dark:bg-slate-800 text-text-main dark:text-slate-100 placeholder:text-text-muted focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-sm"
                placeholder="••••••••"
                required=""
                type="password"
              />
            </div>
          </div>
          <!-- Remember Me -->
          <div class="flex items-center gap-2">
            <input
              class="w-4 h-4 rounded border-border-light text-primary focus:ring-primary"
              id="remember"
              type="checkbox"
            />
            <label
              class="text-text-muted dark:text-slate-400 text-sm cursor-pointer select-none"
              for="remember"
              >Zapamiętaj mnie</label
            >
          </div>
          <!-- Submit Button -->
          <button
            class="w-full h-10 bg-primary hover:bg-primary/90 text-white font-semibold rounded-md shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-2 active:scale-[0.98]"
            type="submit"
          >
            Zaloguj się
            <span class="material-symbols-outlined text-lg">arrow_forward</span>
          </button>
        </form>
        <!-- Registration Link -->
        <div class="mt-8 text-center">
          <p class="text-text-muted dark:text-slate-400 text-sm">
            Nie masz konta?
            <a class="text-primary font-bold hover:underline ml-1" href="#"
              >Zarejestruj się</a
            >
          </p>
        </div>
      </div>
    </div>
    <!-- Background Decoration (Optional subtle elements) -->
    <div
      class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden"
    >
      <div
        class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"
      ></div>
      <div
        class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"
      ></div>
    </div>
  </body>
</html>
